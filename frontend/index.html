<!-- Login Container -->

</header>
<!-- Form Card -->
<section class="bg-surface-container-lowest p-gutter rounded-xl shadow-soft">
<form class="space-y-stack-md" id="loginForm" onsubmit="return false;">
<!-- Email Field -->

</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline transition-colors group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-[#F3F4F6] border-0 rounded-lg font-body-md focus:bg-white focus:ring-1 focus:ring-primary-container transition-all duration-200 outline-none placeholder:text-outline-variant" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">

</div>
<!-- Remember Me -->

<label class="ml-2 font-label-md text-secondary cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary-container hover:bg-surface-tint text-white font-label-md py-4 rounded-lg transition-all duration-300 transform active:scale-[0.98] shadow-md hover:shadow-lg mt-stack-md flex items-center justify-center gap-2" id="signInBtn" type="submit">

<!-- Micro-interactions Script -->
<script>
        const btn = document.getElementById('signInBtn');
        const form = document.getElementById('loginForm');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const originalContent = btn.innerHTML;
            
            // Loading State Animation
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Authenticating...
            `;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            // Simulate Network Delay
            setTimeout(() => {
                btn.innerHTML = `
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    Success
                `;
                btn.classList.remove('bg-primary-container');
                btn.classList.add('bg-emerald-600');
                
                setTimeout(() => {
                    // Redirect simulation
                    window.location.href = 'dashboard.html';
                }, 800);
            }, 1500);
        });

        // Floating label/Input focus effect
        const inputs = document.querySelectorAll('input[type="email"], input[type="password"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
                input.parentElement.parentElement.classList.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
