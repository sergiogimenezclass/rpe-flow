<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>RPE Flow - Lista de Atletas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAFAFA; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">
    <!-- TopAppBar -->
    <nav class="bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 top-0 sticky z-50 h-16">
        <div class="max-w-[1120px] mx-auto px-6 flex justify-between items-center w-full h-full">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='dashboard.html'">
                <span class="material-symbols-outlined text-primary">monitoring</span>
                <span class="font-bold text-headline-md tracking-tight text-primary">RPE Flow</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a class="text-secondary hover:text-primary transition-colors font-medium" href="dashboard.html">Dashboard</a>
                <a class="text-primary font-bold border-b-2 border-primary pb-1" href="athletes.html">Athletes</a>
                <a class="text-secondary hover:text-primary transition-colors font-medium" href="log-workout.html">Log</a>
            </div>
        </div>
    </nav>

    <main class="max-w-[1120px] mx-auto px-6 py-12">
        <div class="mb-8 space-y-4">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-3xl font-bold text-on-surface">Lista de Atletas</h2>
                    <p class="text-secondary mt-1">Supervisa el progreso y estado de fatiga de tu equipo.</p>
                </div>
                <button class="bg-orange-600 text-white font-medium px-6 py-2.5 rounded-lg flex items-center gap-2 shadow-sm hover:bg-orange-700 transition-all active:scale-95">
                    <span class="material-symbols-outlined">person_add</span>
                    Nuevo Atleta
                </button>
            </div>
            
            <div class="relative group max-w-md">
                <span class="material-symbols-outlined absolute left-4 top-3.5 text-secondary">search</span>
                <input id="athlete-search" class="w-full pl-12 pr-4 py-3 bg-gray-50 border-none rounded-xl focus:ring-1 focus:ring-primary focus:bg-white transition-all shadow-sm" placeholder="Buscar atleta..." type="text"/>
            </div>
        </div>

        <!-- Athletes Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="athletes-grid">
            <!-- Dynamic athletes will be injected here -->
        </div>
    </main>

    <!-- BottomNavBar (Mobile Only) -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white border-t md:hidden">
        <a class="flex flex-col items-center justify-center text-gray-500" href="dashboard.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px]">Home</span>
        </a>
        <a class="flex flex-col items-center justify-center text-orange-600 font-bold" href="athletes.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">group</span>
            <span class="text-[10px]">Athletes</span>
        </a>
        <a class="flex flex-col items-center justify-center text-gray-500" href="log-workout.html">
            <span class="material-symbols-outlined">add_circle</span>
            <span class="text-[10px]">Log</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/athletes.js"></script>
</body>
</html>
