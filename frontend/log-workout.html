<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>RPE Flow - Registrar Entrenamiento</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAFAFA; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">
    <!-- TopAppBar -->
    <nav class="bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 top-0 sticky z-50 h-16">
        <div class="max-w-[1120px] mx-auto px-6 flex justify-between items-center w-full h-full">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='dashboard.html'">
                <span class="material-symbols-outlined text-primary">monitoring</span>
                <span class="font-bold text-headline-md tracking-tight text-primary">RPE Flow</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a class="text-secondary hover:text-primary transition-colors font-medium" href="dashboard.html">Dashboard</a>
                <a class="text-secondary hover:text-primary transition-colors font-medium" href="athletes.html">Athletes</a>
                <a class="text-primary font-bold border-b-2 border-primary pb-1" href="log-workout.html">Log</a>
            </div>
        </div>
    </nav>

    <main class="max-w-[1120px] mx-auto px-6 py-12">
        <div class="max-w-2xl mx-auto space-y-8">
            <div class="text-center md:text-left">
                <h2 class="text-3xl font-bold text-on-surface">Registrar Entrenamiento</h2>
                <p class="text-secondary mt-2">Documenta el progreso y ajusta la carga en tiempo real.</p>
            </div>

            <div class="bg-white rounded-xl shadow-sm border p-8">
                <form class="space-y-6" id="logForm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-secondary ml-1">Atleta</label>
                            <select class="w-full bg-gray-50 border-none rounded-lg h-12 px-4" id="athlete_id" required>
                                <option disabled selected value="">Seleccionar Atleta</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-secondary ml-1">Fecha</label>
                            <input class="w-full bg-gray-50 border-none rounded-lg h-12 px-4" id="date" type="date" required/>
                        </div>
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-sm font-medium text-secondary ml-1">Ejercicio</label>
                            <select class="w-full bg-gray-50 border-none rounded-lg h-12 px-4" id="exercise" required>
                                <option disabled selected value="">Seleccionar ejercicio</option>
                                <option value="Sentadilla">Sentadilla</option>
                                <option value="Press Banca">Press Banca</option>
                                <option value="Peso Muerto">Peso Muerto</option>
                                <option value="Press Militar">Press Militar</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-secondary ml-1">Peso (kg)</label>
                            <input class="w-full bg-gray-50 border-none rounded-lg h-12 px-4" id="weight" placeholder="0.0" type="number" step="0.5" required/>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-secondary ml-1">Repeticiones</label>
                            <input class="w-full bg-gray-50 border-none rounded-lg h-12 px-4" id="reps" placeholder="0" type="number" required/>
                        </div>
                        <div class="md:col-span-2 space-y-4 pt-4">
                            <div class="flex justify-between items-end">
                                <label class="text-sm font-medium text-secondary ml-1">Esfuerzo Percibido (RPE)</label>
                                <div class="bg-orange-100 text-orange-600 font-bold px-3 py-1 rounded-full text-xl" id="rpeValue">7</div>
                            </div>
                            <input class="w-full h-2 bg-gray-200 rounded-full appearance-none cursor-pointer accent-orange-600" id="rpeRange" max="10" min="1" step="0.5" type="range" value="7"/>
                        </div>
                    </div>
                    <button class="w-full h-14 bg-orange-600 text-white font-bold rounded-lg flex items-center justify-center gap-2 hover:bg-orange-700 transition-all active:scale-95 shadow-md" id="submitBtn" type="submit">
                        <span class="material-symbols-outlined">save</span>
                        Guardar sesión
                    </button>
                </form>
            </div>

            <!-- Recommendation Card -->
            <div class="hidden" id="recommendationCard">
                <div class="bg-orange-50 border border-orange-200 rounded-xl p-6 flex items-start gap-4">
                    <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center flex-shrink-0">
                        <span class="material-symbols-outlined text-orange-600">trending_up</span>
                    </div>
                    <div>
                        <h4 class="font-bold text-orange-600">Recomendación de Carga</h4>
                        <p class="text-gray-700" id="recommendationText"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- BottomNavBar (Mobile Only) -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white border-t md:hidden">
        <a class="flex flex-col items-center justify-center text-gray-500" href="dashboard.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px]">Home</span>
        </a>
        <a class="flex flex-col items-center justify-center text-gray-500" href="athletes.html">
            <span class="material-symbols-outlined">group</span>
            <span class="text-[10px]">Athletes</span>
        </a>
        <a class="flex flex-col items-center justify-center text-orange-600 font-bold" href="log-workout.html">
            <span class="material-symbols-outlined">add_circle</span>
            <span class="text-[10px]">Log</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/workout.js"></script>
</body>
</html>
